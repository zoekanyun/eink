<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>飞象墨水屏 Demo Hub</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #080c0b;
      --panel: rgba(20, 28, 25, 0.88);
      --line: rgba(126, 255, 187, 0.16);
      --text: #eef8f1;
      --muted: #9fb0a7;
      --green: #18f47d;
      --cyan: #89f7ff;
      font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--text);
      background:
        radial-gradient(circle at 38% 24%, rgba(24, 244, 125, 0.16), transparent 30%),
        radial-gradient(circle at 68% 62%, rgba(137, 247, 255, 0.12), transparent 32%),
        linear-gradient(180deg, #0b0f0d 0%, #050706 100%);
    }

    main {
      width: min(1040px, calc(100vw - 40px));
      margin: 0 auto;
      padding: 64px 0;
    }

    header {
      margin-bottom: 32px;
    }

    .eyebrow {
      margin: 0 0 12px;
      color: var(--green);
      font-size: 14px;
      font-weight: 700;
    }

    h1 {
      margin: 0;
      font-size: clamp(30px, 5vw, 56px);
      line-height: 1.08;
      letter-spacing: 0;
    }

    .intro {
      max-width: 720px;
      margin: 18px 0 0;
      color: var(--muted);
      font-size: 16px;
      line-height: 1.7;
    }

    .demo-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 16px;
    }

    .demo-card {
      display: grid;
      gap: 14px;
      min-height: 190px;
      padding: 22px;
      border-radius: 14px;
      color: inherit;
      text-decoration: none;
      background: var(--panel);
      border: 1px solid var(--line);
      box-shadow: 0 20px 70px rgba(0, 0, 0, 0.28);
      transition: transform 0.18s ease, border-color 0.18s ease, box-shadow 0.18s ease;
    }

    .demo-card:hover {
      transform: translateY(-2px);
      border-color: rgba(137, 247, 255, 0.46);
      box-shadow: 0 24px 80px rgba(0, 0, 0, 0.34), 0 0 28px rgba(24, 244, 125, 0.1);
    }

    .demo-card h2 {
      margin: 0;
      font-size: 22px;
    }

    .demo-card p {
      margin: 0;
      color: var(--muted);
      line-height: 1.6;
    }

    .tag-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-self: end;
    }

    .tag {
      padding: 5px 9px;
      border-radius: 999px;
      color: var(--cyan);
      background: rgba(137, 247, 255, 0.08);
      border: 1px solid rgba(137, 247, 255, 0.14);
      font-size: 12px;
    }
  </style>
</head>
<body>
  <main>
    <header>
      <p class="eyebrow">Eink Prototype Demos</p>
      <h1>飞象墨水屏 Demo Hub</h1>
      <p class="intro">这里集中放置墨水屏项目的可访问原型。后续每个 demo 都可以放在 demos 目录下，根目录保持为统一入口。</p>
    </header>

    <section class="demo-grid" aria-label="Demo 列表">
      <a class="demo-card" href="./demos/data-dashboard-1/">
        <h2>数据驾驶舱 1</h2>
        <p>面向局端和校端的 AI 教学应用数据监测大屏，包含模块编辑态和自然语言调整演示。</p>
        <div class="tag-row">
          <span class="tag">数据平台</span>
          <span class="tag">驾驶舱</span>
          <span class="tag">AI 编辑态</span>
        </div>
      </a>

      <a class="demo-card" href="./demos/parent-report/">
        <h2>家长学习报告</h2>
        <p>面向家长端小程序的学习报告原型，展示学习概览、时长分布、进步关注点与可下钻的学习记录。</p>
        <div class="tag-row">
          <span class="tag">家长端</span>
          <span class="tag">学习报告</span>
          <span class="tag">家校互联</span>
        </div>
      </a>

      <a class="demo-card" href="./demos/classroom-screen-viewer/">
        <h2>课堂调屏</h2>
        <p>老师可随时选择一个或多个学生，实时查看墨水屏画面、并排对比学习状态，并支持切换学生和结束查看。</p>
        <div class="tag-row">
          <span class="tag">教师端</span>
          <span class="tag">课堂互动</span>
          <span class="tag">实时调屏</span>
        </div>
      </a>
    </section>
  </main>
</body>
</html>
