<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>教师端墨水屏调屏 Demo</title>
    <style>
        :root {
            --bg: #f3f7fb;
            --panel: #ffffff;
            --ink: #101828;
            --muted: #697586;
            --subtle: #98a2b3;
            --line: #e5eaf0;
            --line-strong: #d4dce7;
            --blue: #2378ff;
            --blue-dark: #135bd7;
            --blue-soft: #eaf3ff;
            --green: #15875a;
            --green-soft: #e9f7ef;
            --amber: #b7791f;
            --amber-soft: #fff4df;
            --danger: #c23b3b;
            --danger-soft: #fff0f0;
            --shadow: 0 18px 42px rgba(38, 61, 95, 0.10);
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
            color: var(--ink);
            background:
                radial-gradient(circle at 16% 0%, rgba(35, 120, 255, 0.10), transparent 28%),
                radial-gradient(circle at 92% 4%, rgba(21, 135, 90, 0.08), transparent 22%),
                linear-gradient(180deg, #f8fbff 0%, var(--bg) 100%);
        }

        button {
            font: inherit;
        }

        .app {
            display: grid;
            grid-template-columns: 64px 1fr;
            min-height: 100vh;
        }

        .sidebar {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 14px;
            padding: 24px 8px 18px;
            border-right: 1px solid rgba(213, 223, 235, 0.72);
            background: rgba(255, 255, 255, 0.78);
        }

        .logo {
            width: 30px;
            height: 30px;
            margin-bottom: 26px;
            border-radius: 8px 8px 8px 2px;
            background: linear-gradient(145deg, #1fa6ff, #1d66ff);
            position: relative;
        }

        .logo::after {
            content: "";
            position: absolute;
            left: 10px;
            bottom: -5px;
            width: 10px;
            height: 10px;
            border-radius: 0 0 8px 0;
            background: #1d66ff;
        }

        .nav-item {
            width: 48px;
            min-height: 48px;
            display: grid;
            place-items: center;
            gap: 3px;
            border: 0;
            border-radius: 8px;
            background: transparent;
            color: #6b7a90;
            cursor: pointer;
            font-size: 11px;
        }

        .nav-item svg {
            width: 19px;
            height: 19px;
            stroke-width: 1.9;
        }

        .nav-item.active {
            background: var(--blue);
            color: #fff;
        }

        .avatar {
            width: 38px;
            height: 38px;
            margin-top: auto;
            border: 2px solid #fff;
            border-radius: 50%;
            background: linear-gradient(135deg, #ffd9c8, #ffffff 46%, #2c7a7b);
            box-shadow: 0 5px 18px rgba(24, 44, 74, 0.12);
        }

        .main {
            min-width: 0;
            padding: 24px 28px 36px;
        }

        .crumb {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 24px;
            color: var(--muted);
            font-size: 14px;
        }

        .crumb strong {
            color: var(--ink);
        }

        .topbar {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            gap: 20px;
            margin-bottom: 18px;
        }

        h1 {
            margin: 0 0 8px;
            font-size: 28px;
            line-height: 1.2;
            font-weight: 780;
            letter-spacing: 0;
        }

        .subtitle {
            margin: 0;
            color: var(--muted);
            font-size: 14px;
        }

        .actions {
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: flex-end;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 7px;
            min-width: 42px;
            height: 38px;
            padding: 0 14px;
            border-radius: 8px;
            border: 1px solid var(--line-strong);
            background: rgba(255, 255, 255, 0.88);
            color: var(--ink);
            font-size: 14px;
            font-weight: 680;
            cursor: pointer;
        }

        .btn svg {
            width: 17px;
            height: 17px;
        }

        .btn.primary {
            border-color: var(--blue);
            background: var(--blue);
            color: #fff;
            box-shadow: 0 10px 24px rgba(35, 120, 255, 0.18);
        }

        .btn.primary:hover {
            background: var(--blue-dark);
        }

        .btn.danger {
            border-color: #f0b4b4;
            background: var(--danger-soft);
            color: var(--danger);
        }

        .btn.icon {
            width: 38px;
            padding: 0;
        }

        .btn[disabled] {
            cursor: not-allowed;
            opacity: 0.48;
        }

        .class-picker {
            display: flex;
            align-items: center;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 12px;
        }

        .class-chip-button {
            height: 34px;
            padding: 0 12px;
            border: 1px solid var(--line-strong);
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.86);
            color: var(--muted);
            font-size: 13px;
            font-weight: 720;
            cursor: pointer;
        }

        .class-chip-button.active {
            border-color: var(--blue);
            background: var(--blue-soft);
            color: var(--blue-dark);
        }

        .workspace {
            display: grid;
            grid-template-columns: 320px minmax(0, 1fr);
            gap: 18px;
            align-items: start;
        }

        .panel {
            border: 1px solid var(--line);
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.92);
            box-shadow: 0 1px 0 rgba(255, 255, 255, 0.9);
        }

        .panel-head {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            padding: 16px;
            border-bottom: 1px solid var(--line);
        }

        .panel-title {
            margin: 0;
            font-size: 16px;
            font-weight: 760;
        }

        .search {
            margin: 14px 16px 10px;
            position: relative;
        }

        .search input {
            width: 100%;
            height: 38px;
            padding: 0 12px 0 36px;
            border-radius: 8px;
            border: 1px solid var(--line);
            background: #f8fafc;
            color: var(--ink);
            outline: none;
        }

        .search svg {
            position: absolute;
            left: 12px;
            top: 10px;
            width: 18px;
            height: 18px;
            color: var(--muted);
        }

        .student-list {
            display: grid;
            gap: 8px;
            max-height: calc(100vh - 278px);
            min-height: 320px;
            overflow: auto;
            padding: 0 16px 16px;
        }

        .student-row {
            display: grid;
            grid-template-columns: minmax(0, 1fr) auto;
            gap: 10px;
            align-items: center;
            min-height: 54px;
            padding: 10px 12px;
            border: 1px solid var(--line);
            border-radius: 8px;
            background: #fff;
            cursor: pointer;
        }

        .student-row.selected {
            border-color: #9cc5ff;
            background: var(--blue-soft);
        }

        .student-row.live {
            border-color: #a8dfc6;
        }

        .student-row.offline {
            cursor: default;
            background: #f8fafc;
            color: var(--muted);
        }

        .student-name {
            font-weight: 750;
            font-size: 14px;
        }

        .student-meta {
            margin-top: 3px;
            color: var(--muted);
            font-size: 12px;
        }

        .student-action {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 30px;
            height: 30px;
            border: 1px solid var(--line);
            border-radius: 7px;
            background: #fff;
            color: var(--muted);
        }

        .student-row.selected .student-action {
            border-color: var(--blue);
            background: var(--blue);
            color: #fff;
        }

        .student-action svg {
            width: 15px;
            height: 15px;
        }

        .student-status {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            height: 26px;
            padding: 0 9px;
            border-radius: 999px;
            background: #f2f4f7;
            color: var(--muted);
            font-size: 12px;
            font-weight: 760;
        }

        .student-status.offline {
            background: #eef1f5;
            color: #667085;
        }

        .viewer {
            min-height: calc(100vh - 206px);
            padding: 16px;
        }

        .viewer.fullscreen {
            position: fixed;
            inset: 0;
            z-index: 30;
            min-height: 100vh;
            padding: 22px;
            border: 0;
            border-radius: 0;
            background:
                radial-gradient(circle at 10% 0%, rgba(35, 120, 255, 0.10), transparent 28%),
                linear-gradient(180deg, #f8fbff 0%, #eef3f8 100%);
            overflow: auto;
        }

        body.viewer-fullscreen {
            overflow: hidden;
        }

        .viewer-head {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 14px;
            margin-bottom: 14px;
        }

        .viewer-meta {
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }

        .viewer-summary {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: var(--muted);
            font-size: 13px;
            font-weight: 650;
        }

        .viewer-summary strong {
            color: var(--ink);
        }

        .screen-grid {
            display: grid;
            gap: 14px;
        }

        .screen-grid.count-0 {
            display: block;
        }

        .screen-grid.count-1 {
            grid-template-columns: minmax(360px, 620px);
            justify-content: center;
        }

        .screen-grid.count-2 {
            grid-template-columns: repeat(2, minmax(0, 1fr));
        }

        .screen-grid.count-3,
        .screen-grid.count-4 {
            grid-template-columns: repeat(2, minmax(0, 1fr));
        }

        .screen-grid.count-many {
            grid-template-columns: repeat(3, minmax(0, 1fr));
        }

        .viewer.fullscreen .screen-grid {
            width: min(1480px, 100%);
            margin: 0 auto;
        }

        .viewer.fullscreen .screen-grid.count-1 {
            grid-template-columns: minmax(360px, 720px);
        }

        .viewer.fullscreen .screen-grid.count-2,
        .viewer.fullscreen .screen-grid.count-3,
        .viewer.fullscreen .screen-grid.count-4 {
            grid-template-columns: repeat(2, minmax(0, 1fr));
        }

        .viewer.fullscreen .screen-grid.count-many {
            grid-template-columns: repeat(3, minmax(0, 1fr));
        }

        .viewer.fullscreen .eink {
            max-height: calc(100vh - 190px);
            margin: 0 auto;
        }

        .empty {
            display: grid;
            place-items: center;
            min-height: 520px;
            border: 1px dashed #cbd6e2;
            border-radius: 8px;
            background:
                linear-gradient(135deg, rgba(255, 255, 255, 0.68), rgba(234, 243, 255, 0.48)),
                #fff;
            text-align: center;
        }

        .empty-icon {
            width: 76px;
            height: 76px;
            display: grid;
            place-items: center;
            margin: 0 auto 16px;
            border-radius: 8px;
            background: var(--blue-soft);
            color: var(--blue);
        }

        .empty-icon svg {
            width: 40px;
            height: 40px;
        }

        .empty h2 {
            margin: 0 0 8px;
            font-size: 22px;
        }

        .empty p {
            width: min(460px, 100%);
            margin: 0 auto 20px;
            color: var(--muted);
            line-height: 1.7;
        }

        .screen-card {
            position: relative;
            min-width: 0;
            border: 1px solid var(--line);
            border-radius: 8px;
            background: #fff;
            overflow: hidden;
            box-shadow: var(--shadow);
        }

        .screen-card.offline {
            opacity: 0.76;
        }

        .screen-toolbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
            padding: 11px 12px;
            border-bottom: 1px solid var(--line);
            background: rgba(255, 255, 255, 0.96);
        }

        .student-title {
            display: flex;
            align-items: center;
            gap: 9px;
            min-width: 0;
        }

        .student-title strong {
            display: block;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            font-size: 15px;
        }

        .mini-actions {
            display: flex;
            gap: 6px;
            flex-shrink: 0;
        }

        .mini {
            width: 32px;
            height: 32px;
            display: grid;
            place-items: center;
            border: 1px solid var(--line);
            border-radius: 7px;
            background: #fff;
            color: var(--muted);
            cursor: pointer;
        }

        .mini:hover {
            color: var(--blue);
            border-color: #9cc5ff;
            background: var(--blue-soft);
        }

        .mini svg {
            width: 16px;
            height: 16px;
        }

        .eink-wrap {
            padding: 16px;
            background:
                linear-gradient(180deg, #f9fbfd 0%, #eef3f8 100%);
        }

        .eink {
            aspect-ratio: 7 / 9;
            padding: 18px;
            border: 8px solid #2f3541;
            border-radius: 8px;
            background:
                repeating-linear-gradient(0deg, rgba(16, 24, 40, 0.035) 0 1px, transparent 1px 8px),
                #f7f7f2;
            color: #222;
            overflow: hidden;
            position: relative;
        }

        .eink::before {
            content: "";
            position: absolute;
            inset: 0;
            pointer-events: none;
            background: radial-gradient(circle at 15% 8%, rgba(255, 255, 255, 0.64), transparent 22%);
            mix-blend-mode: multiply;
        }

        .eink-top {
            display: flex;
            justify-content: space-between;
            gap: 8px;
            padding-bottom: 10px;
            border-bottom: 2px solid #2c2c2c;
            font-size: 13px;
            font-weight: 800;
        }

        .eink-content {
            position: relative;
            z-index: 1;
            display: grid;
            grid-template-columns: 1.1fr 0.9fr;
            gap: 14px;
            height: calc(100% - 34px);
            padding-top: 14px;
        }

        .paper-title {
            margin: 0 0 10px;
            font-size: 18px;
            line-height: 1.25;
            font-weight: 850;
        }

        .line {
            height: 9px;
            margin: 9px 0;
            border-radius: 4px;
            background: #2a2a2a;
            opacity: 0.9;
        }

        .line.short {
            width: 72%;
        }

        .line.tiny {
            width: 48%;
        }

        .handwriting {
            min-height: 86px;
            margin-top: 14px;
            padding: 12px;
            border: 2px solid #2f2f2f;
            border-radius: 7px;
            background:
                linear-gradient(#f7f7f2 31px, #ccccbe 32px);
            background-size: 100% 32px;
        }

        .handwriting svg {
            width: 100%;
            height: 74px;
        }

        .side-paper {
            display: grid;
            grid-template-rows: auto 1fr;
            gap: 10px;
            min-width: 0;
        }

        .timer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 40px;
            padding: 0 10px;
            border: 2px solid #2c2c2c;
            border-radius: 7px;
            font-size: 13px;
            font-weight: 800;
        }

        .answer-box {
            padding: 12px;
            border: 2px solid #2c2c2c;
            border-radius: 7px;
        }

        .choice {
            display: flex;
            align-items: center;
            gap: 8px;
            margin: 10px 0;
            font-weight: 750;
        }

        .choice::before {
            content: "";
            width: 16px;
            height: 16px;
            border: 2px solid #2c2c2c;
            border-radius: 50%;
        }

        .choice.on::before {
            background: #2c2c2c;
            box-shadow: inset 0 0 0 3px #f7f7f2;
        }

        .screen-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 10px;
            padding: 10px 12px;
            border-top: 1px solid var(--line);
            color: var(--muted);
            font-size: 12px;
        }

        .pulse {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            color: var(--green);
            font-weight: 760;
        }

        .pulse::before {
            content: "";
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: currentColor;
            animation: blink 1.4s ease-in-out infinite;
        }

        @keyframes blink {
            0%, 100% { opacity: 0.35; }
            50% { opacity: 1; }
        }

        .toast {
            position: fixed;
            left: 50%;
            bottom: 28px;
            z-index: 20;
            transform: translateX(-50%) translateY(20px);
            opacity: 0;
            pointer-events: none;
            min-width: 240px;
            padding: 12px 16px;
            border-radius: 8px;
            background: #101828;
            color: #fff;
            text-align: center;
            font-size: 14px;
            box-shadow: 0 16px 36px rgba(16, 24, 40, 0.22);
            transition: opacity 0.2s ease, transform 0.2s ease;
        }

        .toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        .modal-mask {
            position: fixed;
            inset: 0;
            z-index: 10;
            display: none;
            align-items: center;
            justify-content: center;
            padding: 24px;
            background: rgba(16, 24, 40, 0.42);
        }

        .modal-mask.show {
            display: flex;
        }

        .modal {
            width: min(760px, 100%);
            max-height: min(760px, calc(100vh - 48px));
            display: grid;
            grid-template-rows: auto auto 1fr auto;
            overflow: hidden;
            border-radius: 8px;
            background: #fff;
            box-shadow: 0 24px 80px rgba(16, 24, 40, 0.28);
        }

        .modal .student-list {
            grid-template-columns: repeat(2, minmax(0, 1fr));
            max-height: 420px;
            min-height: 260px;
            padding-top: 0;
        }

        .modal-foot {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 14px;
            padding: 14px 16px;
            border-top: 1px solid var(--line);
            background: #f8fafc;
        }

        .selected-count {
            color: var(--muted);
            font-size: 13px;
        }

        .hidden {
            display: none !important;
        }

        @media (max-width: 1180px) {
            .workspace {
                grid-template-columns: 270px minmax(0, 1fr);
            }

            .screen-grid.count-many {
                grid-template-columns: repeat(2, minmax(0, 1fr));
            }
        }

        @media (max-width: 900px) {
            .app {
                grid-template-columns: 1fr;
            }

            .sidebar {
                position: sticky;
                top: 0;
                z-index: 5;
                flex-direction: row;
                justify-content: flex-start;
                overflow: auto;
                padding: 10px 14px;
            }

            .logo,
            .avatar {
                margin: 0;
                flex: 0 0 auto;
            }

            .main {
                padding: 20px 16px 30px;
            }

            .topbar,
            .viewer-head {
                align-items: flex-start;
                flex-direction: column;
            }

            .actions {
                justify-content: flex-start;
            }

            .workspace {
                grid-template-columns: 1fr;
            }

            .student-list {
                max-height: none;
                min-height: 0;
            }

            .screen-grid.count-1,
            .screen-grid.count-2,
            .screen-grid.count-3,
            .screen-grid.count-4,
            .screen-grid.count-many {
                grid-template-columns: 1fr;
            }

            .modal .student-list {
                grid-template-columns: 1fr;
            }
        }

        @media (max-width: 620px) {
            .eink-content {
                grid-template-columns: 1fr;
                overflow: hidden;
            }

            .side-paper {
                display: none;
            }
        }
    </style>
</head>
<body>
    <div class="app">
        <aside class="sidebar" aria-label="主导航">
            <div class="logo" aria-label="墨水屏"></div>
            <button class="nav-item" title="写作伙伴">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M12 20h9"/><path d="M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4Z"/></svg>
                <span>写作</span>
            </button>
            <button class="nav-item" title="作业">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8Z"/><path d="M14 2v6h6"/><path d="M9 15h6"/><path d="M9 11h2"/></svg>
                <span>作业</span>
            </button>
            <button class="nav-item" title="直播">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="m22 8-6 4 6 4Z"/><rect x="2" y="6" width="14" height="12" rx="2"/></svg>
                <span>直播</span>
            </button>
            <button class="nav-item active" title="墨水屏">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><rect x="5" y="3" width="14" height="18" rx="2"/><path d="M9 7h6"/><path d="M9 17h6"/></svg>
                <span>墨水屏</span>
            </button>
            <button class="nav-item" title="学校数据">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M3 3v18h18"/><rect x="7" y="11" width="3" height="6"/><rect x="12" y="7" width="3" height="10"/><rect x="17" y="4" width="3" height="13"/></svg>
                <span>数据</span>
            </button>
            <div class="avatar" aria-label="王老师头像"></div>
        </aside>

        <main class="main">
            <div class="crumb">
                <span>‹</span>
                <span>墨水屏首页</span>
                <span>›</span>
                <strong>课堂调屏</strong>
            </div>

            <header class="topbar">
                <div>
                    <h1>课堂调屏</h1>
                    <div class="class-picker" id="classPicker" aria-label="班级选择"></div>
                </div>
            </header>

            <section class="workspace">
                <aside class="panel">
                    <div class="panel-head">
                        <h2 class="panel-title">选择学生</h2>
                    </div>
                    <div class="search">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg>
                        <input id="searchInput" type="search" placeholder="搜索学生姓名">
                    </div>
                    <div class="student-list" id="studentList" aria-label="可调取学生"></div>
                </aside>

                <section class="panel viewer">
                    <div class="viewer-head">
                        <div class="viewer-meta">
                            <h2 class="panel-title">屏幕查看区</h2>
                            <span class="viewer-summary" id="viewerSummary">等待选择学生</span>
                        </div>
                        <div class="actions">
                            <button class="btn" id="fullscreenBtn">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M8 3H5a2 2 0 0 0-2 2v3"/><path d="M21 8V5a2 2 0 0 0-2-2h-3"/><path d="M3 16v3a2 2 0 0 0 2 2h3"/><path d="M16 21h3a2 2 0 0 0 2-2v-3"/></svg>
                                全屏
                            </button>
                            <button class="btn danger" id="endViewBtn">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><rect x="6" y="6" width="12" height="12" rx="2"/></svg>
                                结束
                            </button>
                        </div>
                    </div>
                    <div class="screen-grid count-0" id="screenGrid"></div>
                </section>
            </section>
        </main>
    </div>

    <div class="modal-mask" id="modalMask" aria-hidden="true">
        <div class="modal" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
            <div class="panel-head">
                <h2 class="panel-title" id="modalTitle">切换学生</h2>
                <button class="btn icon" id="modalClose" title="关闭">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>
                </button>
            </div>
            <div class="search">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg>
                <input id="modalSearch" type="search" placeholder="输入姓名快速查找">
            </div>
            <div class="student-list" id="modalList"></div>
            <div class="modal-foot">
                <span class="selected-count" id="modalHint">选择 1 位学生替换当前屏幕</span>
                <div class="actions">
                    <button class="btn" id="modalCancel">取消</button>
                    <button class="btn primary" id="modalConfirm">确认</button>
                </div>
            </div>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script>
        const classes = [
            { id: "c1", name: "初一 1 班" },
            { id: "c2", name: "初一 2 班" },
            { id: "c3", name: "初一 3 班" }
        ];

        const students = [
            { id: 1, classId: "c1", name: "陈雨桐", seat: "01", task: "课堂小测", page: "第 2 题", status: "作答中", online: true, seed: 0 },
            { id: 2, classId: "c1", name: "李嘉言", seat: "02", task: "课堂小测", page: "第 3 题", status: "停留 2 分钟", online: true, seed: 1 },
            { id: 3, classId: "c1", name: "周子墨", seat: "03", task: "教材同步", page: "P36", status: "阅读中", online: true, seed: 2 },
            { id: 4, classId: "c1", name: "林若曦", seat: "04", task: "课堂小测", page: "第 2 题", status: "已提交", online: true, seed: 3 },
            { id: 5, classId: "c1", name: "王一诺", seat: "05", task: "课堂小测", page: "第 1 题", status: "关机", online: false, seed: 4 },
            { id: 6, classId: "c1", name: "赵明轩", seat: "06", task: "万能本", page: "草稿页", status: "演算中", online: true, seed: 5 },
            { id: 7, classId: "c1", name: "孙沐阳", seat: "07", task: "课堂小测", page: "第 2 题", status: "作答中", online: true, seed: 6 },
            { id: 8, classId: "c1", name: "何思源", seat: "08", task: "教材同步", page: "P37", status: "阅读中", online: true, seed: 7 },
            { id: 9, classId: "c2", name: "刘芷晴", seat: "01", task: "课堂小测", page: "第 2 题", status: "作答中", online: true, seed: 8 },
            { id: 10, classId: "c2", name: "郭佳宁", seat: "02", task: "万能本", page: "草稿页", status: "关机", online: false, seed: 9 },
            { id: 11, classId: "c2", name: "许文博", seat: "03", task: "课堂小测", page: "第 3 题", status: "作答中", online: true, seed: 10 },
            { id: 12, classId: "c2", name: "唐语涵", seat: "04", task: "课堂小测", page: "第 2 题", status: "作答中", online: true, seed: 11 },
            { id: 13, classId: "c2", name: "沈知夏", seat: "05", task: "教材同步", page: "P36", status: "阅读中", online: true, seed: 12 },
            { id: 14, classId: "c2", name: "顾承泽", seat: "06", task: "课堂小测", page: "第 1 题", status: "作答中", online: true, seed: 13 },
            { id: 15, classId: "c3", name: "叶安然", seat: "01", task: "课堂小测", page: "第 2 题", status: "作答中", online: true, seed: 14 },
            { id: 16, classId: "c3", name: "马思远", seat: "02", task: "教材同步", page: "P37", status: "关机", online: false, seed: 15 },
            { id: 17, classId: "c3", name: "宋可欣", seat: "03", task: "万能本", page: "草稿页", status: "演算中", online: true, seed: 16 },
            { id: 18, classId: "c3", name: "邵子涵", seat: "04", task: "课堂小测", page: "第 3 题", status: "停留 2 分钟", online: true, seed: 17 }
        ];

        const selectedClasses = new Set(["c1"]);
        const selected = new Set();
        let liveIds = [];
        let replaceTarget = null;
        let modalSelected = new Set();

        const $ = (selector) => document.querySelector(selector);
        const classPicker = $("#classPicker");
        const studentList = $("#studentList");
        const viewer = $(".viewer");
        const screenGrid = $("#screenGrid");
        const viewerSummary = $("#viewerSummary");
        const fullscreenBtn = $("#fullscreenBtn");
        const toast = $("#toast");
        let isViewerFullscreen = false;

        function iconPaths(type) {
            const icons = {
                swap: '<path d="M7 7h11l-3-3"/><path d="M17 17H6l3 3"/><path d="m18 7-3 3"/><path d="m6 17 3-3"/>',
                close: '<path d="M18 6 6 18"/><path d="m6 6 12 12"/>'
            };
            return `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor">${icons[type]}</svg>`;
        }

        function classNameOf(classId) {
            return classes.find((item) => item.id === classId)?.name || "";
        }

        function availableStudents() {
            return students.filter((student) => selectedClasses.has(student.classId));
        }

        function filteredStudents(source = availableStudents(), query = "") {
            const keyword = query.trim().toLowerCase();
            return source.filter((student) => {
                const hitKeyword = !keyword || student.name.toLowerCase().includes(keyword);
                return hitKeyword;
            });
        }

        function renderClassPicker() {
            classPicker.innerHTML = classes.map((item) => `
                <button class="class-chip-button ${selectedClasses.has(item.id) ? "active" : ""}" data-class-id="${item.id}">
                    ${item.name}
                </button>
            `).join("");
        }

        function renderStudents() {
            const query = $("#searchInput").value;
            studentList.innerHTML = filteredStudents(availableStudents(), query).map((student) => {
                const isSelected = selected.has(student.id);
                const isLive = liveIds.includes(student.id);
                const isOffline = !student.online;
                return `
                    <button class="student-row ${isSelected ? "selected" : ""} ${isLive ? "live" : ""} ${isOffline ? "offline" : ""}" data-id="${student.id}">
                        <span>
                            <span class="student-name">${student.name}</span>
                            <span class="student-meta">${classNameOf(student.classId)}</span>
                        </span>
                        ${isOffline ? '<span class="student-status offline">关机</span>' : `<span class="student-action" title="${isSelected ? "已选择" : "选择"}">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">${isSelected ? '<path d="m20 6-11 11-5-5"/>' : '<path d="M12 5v14"/><path d="M5 12h14"/>'}</svg>
                        </span>`}
                    </button>
                `;
            }).join("");
        }

        function gridClass(count) {
            if (count === 0) return "count-0";
            if (count === 1) return "count-1";
            if (count === 2) return "count-2";
            if (count === 3) return "count-3";
            if (count === 4) return "count-4";
            return "count-many";
        }

        function paperLines(student) {
            const widthA = 82 - (student.seed % 4) * 8;
            const widthB = 58 + (student.seed % 5) * 7;
            return `
                <div class="line" style="width:${widthA}%"></div>
                <div class="line short" style="width:${widthB}%"></div>
                <div class="line tiny"></div>
            `;
        }

        function handwriting(student) {
            const dy = student.seed % 2 === 0 ? 6 : 0;
            return `
                <svg viewBox="0 0 260 80" fill="none" stroke="#222" stroke-width="4" stroke-linecap="round">
                    <path d="M8 ${36 + dy} C28 12, 46 60, 68 34 S105 18, 124 42 S158 64, 176 32 S214 20, 244 48"/>
                    <path d="M18 ${62 - dy} C52 46, 72 70, 104 54 S156 42, 190 60"/>
                </svg>
            `;
        }

        function screenCard(student) {
            const choice = ["A", "B", "C", "D"][student.seed % 4];
            return `
                <article class="screen-card" data-id="${student.id}">
                    <div class="screen-toolbar">
                        <div class="student-title">
                            <strong>${student.name}</strong>
                        </div>
                        <div class="mini-actions">
                            <button class="mini" title="切换学生" data-action="replace" data-id="${student.id}">${iconPaths("swap")}</button>
                            <button class="mini" title="结束此屏" data-action="remove" data-id="${student.id}">${iconPaths("close")}</button>
                        </div>
                    </div>
                    <div class="eink-wrap">
                        <div class="eink">
                            <div class="eink-top">
                                <span>${student.task}</span>
                                <span>${student.page}</span>
                            </div>
                            <div class="eink-content">
                                <div>
                                    <h3 class="paper-title">${student.seed % 3 === 0 ? "请列式计算并说明理由" : "观察图形，选择正确答案"}</h3>
                                    ${paperLines(student)}
                                    <div class="handwriting">${handwriting(student)}</div>
                                </div>
                                <div class="side-paper">
                                    <div class="timer">
                                        <span>剩余</span>
                                        <span>03:${18 + student.seed}</span>
                                    </div>
                                    <div class="answer-box">
                                        ${["A", "B", "C", "D"].map((item) => `<div class="choice ${item === choice ? "on" : ""}">${item}. 选项内容</div>`).join("")}
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                    <footer class="screen-footer">
                        <span class="pulse">实时画面</span>
                    </footer>
                </article>
            `;
        }

        function emptyView() {
            return `
                <div class="empty">
                    <div>
                        <div class="empty-icon">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><rect x="5" y="3" width="14" height="18" rx="2"/><path d="M9 7h6"/><path d="M9 12h6"/><path d="M9 17h4"/></svg>
                        </div>
                        <h2>请选择要查看的学生屏幕</h2>
                        <p>老师可在左侧学生列表中点击任意学生，右侧会立即显示该学生的墨水屏实时画面；选择多名学生时，会自动并排展示，方便课堂中快速对比。</p>
                    </div>
                </div>
            `;
        }

        function renderScreens() {
            liveIds = [...selected];
            screenGrid.className = `screen-grid ${gridClass(liveIds.length)}`;
            screenGrid.innerHTML = liveIds.length ? liveIds.map((id) => screenCard(students.find((student) => student.id === id))).join("") : emptyView();

            viewerSummary.innerHTML = liveIds.length ? `实时同步中 · <strong>${liveIds.length}</strong> 屏对比` : "等待选择学生";
            renderStudents();
        }

        function setViewerFullscreen(nextState) {
            isViewerFullscreen = nextState;
            viewer.classList.toggle("fullscreen", isViewerFullscreen);
            document.body.classList.toggle("viewer-fullscreen", isViewerFullscreen);
            fullscreenBtn.innerHTML = isViewerFullscreen ? `
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M8 3v3a2 2 0 0 1-2 2H3"/><path d="M21 8h-3a2 2 0 0 1-2-2V3"/><path d="M3 16h3a2 2 0 0 1 2 2v3"/><path d="M16 21v-3a2 2 0 0 1 2-2h3"/></svg>
                退出全屏
            ` : `
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M8 3H5a2 2 0 0 0-2 2v3"/><path d="M21 8V5a2 2 0 0 0-2-2h-3"/><path d="M3 16v3a2 2 0 0 0 2 2h3"/><path d="M16 21h3a2 2 0 0 0 2-2v-3"/></svg>
                全屏
            `;
        }

        function endCurrentView() {
            if (!selected.size) {
                showToast("当前没有正在查看的屏幕");
                return;
            }
            selected.clear();
            liveIds = [];
            renderScreens();
            showToast("已结束");
        }

        function removeLive(id) {
            selected.delete(id);
            renderScreens();
            showToast("已结束该学生屏幕");
        }

        function openModal(targetId = null) {
            replaceTarget = targetId;
            modalSelected = new Set();
            $("#modalTitle").textContent = "切换学生";
            $("#modalHint").textContent = "选择 1 位学生替换当前屏幕";
            $("#modalSearch").value = "";
            $("#modalMask").classList.add("show");
            $("#modalMask").setAttribute("aria-hidden", "false");
            renderModalList();
        }

        function closeModal() {
            $("#modalMask").classList.remove("show");
            $("#modalMask").setAttribute("aria-hidden", "true");
        }

        function renderModalList() {
            const query = $("#modalSearch").value.trim().toLowerCase();
            const list = availableStudents().filter((student) => {
                const notCurrent = student.id !== replaceTarget && !selected.has(student.id);
                const hit = !query || student.name.toLowerCase().includes(query);
                return notCurrent && hit && student.online;
            });
            $("#modalList").innerHTML = list.map((student) => {
                const active = modalSelected.has(student.id);
                return `
                    <button class="student-row ${active ? "selected" : ""}" data-modal-id="${student.id}">
                        <span>
                            <span class="student-name">${student.name}</span>
                            <span class="student-meta">${classNameOf(student.classId)}</span>
                        </span>
                    </button>
                `;
            }).join("");
            const count = modalSelected.size;
            $("#modalHint").textContent = count ? "已选择 1 位学生替换当前屏幕" : "选择 1 位学生替换当前屏幕";
        }

        function confirmModal() {
            const ids = [...modalSelected];
            if (!ids.length) {
                showToast("请选择学生");
                return;
            }
            const nextId = ids[0];
            selected.delete(replaceTarget);
            selected.add(nextId);
            showToast("已切换学生屏幕");
            closeModal();
            renderScreens();
        }

        function showToast(message) {
            toast.textContent = message;
            toast.classList.add("show");
            window.clearTimeout(showToast.timer);
            showToast.timer = window.setTimeout(() => toast.classList.remove("show"), 1800);
        }

        studentList.addEventListener("click", (event) => {
            const row = event.target.closest("[data-id]");
            if (!row) return;
            const id = Number(row.dataset.id);
            const student = students.find((item) => item.id === id);
            if (!student?.online) {
                showToast("该学生设备已关机");
                return;
            }
            selected.has(id) ? selected.delete(id) : selected.add(id);
            renderScreens();
        });

        screenGrid.addEventListener("click", (event) => {
            const actionButton = event.target.closest("[data-action]");
            if (!actionButton) return;
            const id = Number(actionButton.dataset.id);
            const action = actionButton.dataset.action;
            if (action === "remove") removeLive(id);
            if (action === "replace") openModal(id);
        });

        classPicker.addEventListener("click", (event) => {
            const button = event.target.closest("[data-class-id]");
            if (!button) return;
            const id = button.dataset.classId;
            if (selectedClasses.has(id) && selectedClasses.size === 1) {
                showToast("至少保留一个班级");
                return;
            }
            selectedClasses.has(id) ? selectedClasses.delete(id) : selectedClasses.add(id);
            const availableIds = new Set(availableStudents().map((student) => student.id));
            [...selected].forEach((studentId) => {
                if (!availableIds.has(studentId)) selected.delete(studentId);
            });
            renderClassPicker();
            renderScreens();
        });

        $("#endViewBtn").addEventListener("click", endCurrentView);
        fullscreenBtn.addEventListener("click", () => setViewerFullscreen(!isViewerFullscreen));
        $("#searchInput").addEventListener("input", renderStudents);

        document.addEventListener("keydown", (event) => {
            if (event.key === "Escape" && isViewerFullscreen) {
                setViewerFullscreen(false);
            }
        });

        $("#modalClose").addEventListener("click", closeModal);
        $("#modalCancel").addEventListener("click", closeModal);
        $("#modalConfirm").addEventListener("click", confirmModal);
        $("#modalSearch").addEventListener("input", renderModalList);
        $("#modalMask").addEventListener("click", (event) => {
            if (event.target.id === "modalMask") closeModal();
        });
        $("#modalList").addEventListener("click", (event) => {
            const row = event.target.closest("[data-modal-id]");
            if (!row) return;
            const id = Number(row.dataset.modalId);
            modalSelected = new Set([id]);
            renderModalList();
        });

        renderClassPicker();
        renderStudents();
        renderScreens();
    </script>
</body>
</html>
